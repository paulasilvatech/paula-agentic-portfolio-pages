.page{min-height:100vh}
.max-w{max-width:1340px;margin:0 auto;padding:0 24px}

.hero-bg{background:linear-gradient(135deg,#054005 0%,#107C10 40%,#4CAF50 100%);position:relative;overflow:hidden}

.hero-bg::after{content:'';position:absolute;bottom:-40%;left:-20%;width:600px;height:600px;background:radial-gradient(circle,rgba(16,124,16,.12),transparent 70%);animation:blob2 18s ease-in-out infinite}

.card{background:#fff;border:1px solid #e5e7eb;border-radius:16px;transition:all .3s cubic-bezier(.4,0,.2,1)}
.card:hover{box-shadow:0 20px 60px rgba(0,0,0,.08);transform:translateY(-4px);border-color:#107C10}
.card-sm{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;transition:all .25s ease}
.card-sm:hover{box-shadow:0 8px 30px rgba(0,0,0,.06);border-color:#107C10}

.pill{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:100px;font-size:12px;font-weight:600;white-space:nowrap}

.flow-step{transition:all .4s cubic-bezier(.4,0,.2,1)}
.flow-step.active{background:#107C10;color:#fff;box-shadow:0 8px 30px rgba(16,124,16,.3);transform:scale(1.05)}
.flow-step.completed{background:#E7F5E7;color:var(--green);border-color:var(--green)}

.code-block{background:#1e1e1e;color:#d4d4d4;border-radius:10px;padding:20px;font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;overflow-x:auto;position:relative}

.code-key{color:#9CDCFE}.code-str{color:#CE9178}.code-num{color:#B5CEA8}.code-cmt{color:#6A9955}.code-kw{color:#569CD6}

.progress-fill{height:100%;border-radius:5px;transition:width 1.5s cubic-bezier(.4,0,.2,1);position:relative}
.progress-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 2s infinite}

.sdlc-active{background:var(--green);color:#fff;box-shadow:0 4px 15px rgba(16,124,16,.3)}

    context:'Desenvolvedor Legado (genérico) mantém sistemas críticos que não são mainframe mas são igualmente difíceis: J2EE de 15 anos, PL/SQL com 50K linhas de procedures, VB6 sem path de evolução, .NET Framework sem upgrade há 10 anos. O impacto de AI é transformacional: código sem documentação é documentado, código sem testes ganha characterization tests, código sem pipeline ganha CI/CD, e modernização incremental (strangler fig) se torna viável com agents que geram código equivalente + testes de equivalência automaticamente.',

    desc:'Desenvolvimento e manutenção de sistemas COBOL em mainframe (IBM z/OS, CICS, JCL, DB2). Milhões de linhas de código crítico em produção há 20-40 anos. Trabalha em cenário de coexistência permanente, legado continua operando enquanto sistemas modernos crescem ao lado. Copilot suporta COBOL nativamente para completions, explicação e geração de código.',
    desc_en:'Development and maintenance of COBOL systems on mainframe (IBM z/OS, CICS, JCL, DB2). Millions of lines of mission-critical code running in production for 20-40 years. Works in a permanent coexistence scenario, legacy systems continue operating while modern systems grow alongside them. Copilot natively supports COBOL for completions, explanation, and code generation.',
    desc_es:'Desarrollo y mantenimiento de sistemas COBOL en mainframe (IBM z/OS, CICS, JCL, DB2). Millones de líneas de código crítico en producción desde hace 20-40 años. Trabaja en un escenario de coexistencia permanente, los sistemas legados siguen operando mientras los sistemas modernos crecen en paralelo. Copilot soporta COBOL de forma nativa para completions, explicación y generación de código.',
    pain:'Código COBOL sem documentação (30+ anos). Onboarding de novos devs leva meses, conhecimento tácito em seniors que estão se aposentando. JCL é opaca e propensa a erros. Testes são manuais com dados fabricados. Integração legado↔moderno requer conhecimento profundo de MQ, CICS Web Services. Debug de ABENDs consome horas analisando dumps.',
    pain_en:'Undocumented COBOL code (30+ years). Onboarding new developers takes months, tacit knowledge held by seniors approaching retirement. JCL is opaque and error-prone. Testing is manual with fabricated data. Legacy-to-modern integration requires deep knowledge of MQ and CICS Web Services. Debugging ABENDs consumes hours analyzing dumps.',

    context:'UX Designer em Enterprise cria interfaces para sistemas usados por milhares de usuários internos e milhões de clientes. Prototipação instantânea (Figma Make + Spark) elimina ciclos de semanas esperando validação visual. Acessibilidade auditada desde o design, não após deployment. Design tokens sincronizados garantem consistência visual code↔design. Democratização da prototipação via Spark permite que POs e gestores validem ideias em minutos.',

    context_es:'Los UX Designers en entornos empresariales crean interfaces para sistemas usados por miles de usuarios internos y millones de clientes. El prototipado instantáneo (Figma Make + Spark) elimina ciclos de semanas esperando validación visual. La accesibilidad se audita desde el diseño, no después del despliegue. Los design tokens sincronizados garantizan consistencia visual entre código y diseño. La democratización del prototipado vía Spark permite que POs y gerentes validen ideas en minutos.'

    desc:'Liderança de engenharia responsável por produtividade, adoção de ferramentas, métricas de delivery, gestão de pessoas e ROI do investimento em AI. Em organizações enterprise, gerencia 20-50+ engenheiros distribuídos em múltiplos times e escritórios. É o perfil que justifica o investimento em Copilot/AI para o C-level e garante que a adoção gera valor real mensurável.',

function AnimCounter({end,suffix,duration}){
  const [val,setVal]=useState(0);
  useEffect(function(){
    var start=performance.now();
    var dur=duration||1800;
    function tick(now){
      var p=Math.min((now-start)/dur,1);
      var eased=1-Math.pow(1-p,3);
      setVal(Math.round(eased*end));
      if(p<1)requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  },[end]);
  return e('span',null,val+(suffix||''));
}

function LangToggle({lang,setLang}){
  return e('div',{style:{display:'flex',gap:2,background:'#f3f4f6',borderRadius:8,padding:2}},
    ['pt','en','es'].map(function(l){
      return e('button',{key:l,onClick:function(){setLang(l)},style:{
        padding:'5px 12px',borderRadius:6,fontSize:11,fontWeight:700,border:'none',cursor:'pointer',fontFamily:'inherit',
        background:lang===l?'#107C10':'transparent',color:lang===l?'#fff':'#6b7280',transition:'all .2s',textTransform:'uppercase'
      }},l)
    })
  )
}

function t(lang,key){return UI_LABELS[lang]&&UI_LABELS[lang][key]||UI_LABELS.pt[key]||key}
function tp(lang,obj,field){if(lang==='pt')return obj[field];var k=field+'_'+lang;return obj[k]||obj[field]}
function tpa(lang,obj,field){if(lang==='pt')return obj[field];var k=field+'_'+lang;return obj[k]||obj[field]}

function App(){
  var _p=useState('landing'),page=_p[0],setPage=_p[1];
  var _pid=useState(null),profileId=_pid[0],setProfileId=_pid[1];
  var _l=useState('pt'),lang=_l[0],setLang=_l[1];

  function goProfile(id){setProfileId(id);setPage('profile');window.scrollTo(0,0)}
  function goHome(){setPage('landing');setProfileId(null);window.scrollTo(0,0)}

  var profile=PROFILES.find(function(p){return p.id===profileId});

  return e('div',null,
    e(NavBar,{page:page,onHome:goHome,lang:lang,setLang:setLang}),
    page==='landing'?e(LandingPage,{onProfile:goProfile,lang:lang}):null,
    page==='profile'&&profile?e(ProfilePage,{profile:profile,onBack:goHome,lang:lang}):null
  );
}

ReactDOM.render(e(App),document.getElementById('root'));
</script>
